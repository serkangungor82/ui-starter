services:
  backend:
    build: ./backend
    container_name: ui-starter-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: sqlite:///./app.db
      CORS_ORIGINS: http://localhost:3000
      SECRET_KEY: change-me-in-production-please-use-a-long-random-string
    ports:
      - "8000:8000"
    volumes:
      - backend_data:/app

  frontend:
    build:
      context: ./frontend
      args:
        - NEXT_PUBLIC_API_URL=http://localhost:8000
    container_name: ui-starter-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  backend_data:
